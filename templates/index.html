<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>User Registration</h2>

    <form id="registerForm">

        <input type="text"
               id="fullname"
               placeholder="Full Name"
               required>

        <input type="email"
               id="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p id="message"></p>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
